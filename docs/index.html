<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta name="robots" content="noindex, nofollow">
    <title>CYBERSEC LAB | Irfan Wahyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
      /* Prevent right-click context menu */
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <nav class="navbar hidden" id="navbar">
        <div class="logo"><span class="dim">[</span><span class="bright">CYBERSEC</span><span class="dim">]</span></div>
        <div class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></div>
        <div class="nav-links" id="nav-links">
            <a href="#" class="nav-link active" data-page="dashboard">Dashboard</a>
            <a href="#" class="nav-link" data-page="path">Path</a>
            <a href="#" class="nav-link" data-page="curriculum">Curriculum</a>
            <a href="#" class="nav-link" data-page="challenges">Challenges</a>
            <a href="#" class="nav-link" data-page="cheatsheet">Cheat Sheet</a>
            <a href="#" class="nav-link" data-page="projects">Projects</a>
            <a href="#" class="nav-link" data-page="admin">Admin</a>
        </div>
        <div class="user-info">
            <span class="xp-badge" id="xp-badge">0 XP</span>
            <span class="user-avatar">IR</span>
        </div>
    </nav>
    <main class="container" id="app"></main>
    <div class="toast-container" id="toast-container"></div>
    <div class="confetti-container" id="confetti-container"></div>
    <script src="app.js"></script>
    <script>
      // Prevent right-click
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      
      // Prevent common DevTools shortcuts
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
        // Ctrl+U (View Source)
        if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
        // Ctrl+S (Save)
        if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); return false; }
      });
    </script>
</body>
</html>
